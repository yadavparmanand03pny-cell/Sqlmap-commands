<svg xmlns="http://www.w3.org/2000/svg" width="500" height="350" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05070a"/><stop offset="100%" stop-color="#0f1622"/>
    </linearGradient>
    <linearGradient id="folderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <radialGradient id="scanGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="500" height="350" fill="url(#bg)"/>

  <!-- subtle grid background for "network/recon" feel -->
  <g stroke="#1e293b" stroke-width="1" opacity="0.5">
    <line x1="0" y1="60" x2="500" y2="60"/>
    <line x1="0" y1="120" x2="500" y2="120"/>
    <line x1="0" y1="180" x2="500" y2="180"/>
    <line x1="0" y1="240" x2="500" y2="240"/>
    <line x1="0" y1="300" x2="500" y2="300"/>
    <line x1="100" y1="0" x2="100" y2="350"/>
    <line x1="200" y1="0" x2="200" y2="350"/>
    <line x1="300" y1="0" x2="300" y2="350"/>
    <line x1="400" y1="0" x2="400" y2="350"/>
  </g>

  <!-- radar scan glow behind folder -->
  <circle cx="250" cy="170" r="150" fill="url(#scanGlow)"/>

  <!-- radar sweep circles -->
  <g stroke="#38bdf8" fill="none" opacity="0.35">
    <circle cx="250" cy="170" r="60"/>
    <circle cx="250" cy="170" r="95"/>
    <circle cx="250" cy="170" r="130"/>
  </g>

  <!-- folder shape -->
  <g transform="translate(150,90)" filter="url(#softGlow)">
    <path d="M0 30 L0 145 Q0 160 15 160 L185 160 Q200 160 200 145 L200 55 Q200 40 185 40 L100 40 L82 15 Q75 5 60 5 L15 5 Q0 5 0 20 Z" fill="url(#folderGrad)"/>
  </g>

  <!-- magnifier glass over folder -->
  <g transform="translate(215,120)">
    <circle cx="35" cy="35" r="32" fill="#0a0e14" opacity="0.35"/>
    <circle cx="35" cy="35" r="32" fill="none" stroke="#ffffff" stroke-width="7"/>
    <line x1="58" y1="58" x2="92" y2="92" stroke="#ffffff" stroke-width="9" stroke-linecap="round"/>
    <!-- small crosshair inside lens -->
    <line x1="35" y1="18" x2="35" y2="52" stroke="#ffffff" stroke-width="2" opacity="0.6"/>
    <line x1="18" y1="35" x2="52" y2="35" stroke="#ffffff" stroke-width="2" opacity="0.6"/>
  </g>

  <!-- small orbiting dots (representing scanned data points) -->
  <circle cx="130" cy="110" r="4" fill="#38bdf8"/>
  <circle cx="370" cy="130" r="4" fill="#22d3ee"/>
  <circle cx="360" cy="230" r="4" fill="#38bdf8"/>
  <circle cx="140" cy="240" r="4" fill="#22d3ee"/>

  <text x="250" y="325" font-family="Arial, sans-serif" font-size="30" font-weight="bold" fill="#7dd3fc" text-anchor="middle" letter-spacing="4">RECON</text>
</svg>
