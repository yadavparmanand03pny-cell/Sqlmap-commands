<svg xmlns="http://www.w3.org/2000/svg" width="500" height="350" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05070a"/><stop offset="100%" stop-color="#0f1622"/>
    </linearGradient>
    <linearGradient id="coreGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="500" height="350" fill="url(#bg)"/>

  <!-- faint grid -->
  <g stroke="#1e293b" stroke-width="1" opacity="0.5">
    <line x1="0" y1="70" x2="500" y2="70"/>
    <line x1="0" y1="140" x2="500" y2="140"/>
    <line x1="0" y1="210" x2="500" y2="210"/>
    <line x1="0" y1="280" x2="500" y2="280"/>
    <line x1="125" y1="0" x2="125" y2="350"/>
    <line x1="250" y1="0" x2="250" y2="350"/>
    <line x1="375" y1="0" x2="375" y2="350"/>
  </g>

  <!-- central target/crosshair core -->
  <g transform="translate(250,150)" filter="url(#softGlow)">
    <circle cx="0" cy="0" r="42" fill="url(#coreGrad)"/>
    <circle cx="0" cy="0" r="42" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.6"/>
    <circle cx="0" cy="0" r="18" fill="#0a0e14"/>
    <circle cx="0" cy="0" r="7" fill="#ffffff"/>
  </g>

  <!-- orbiting nodes representing attack steps: subdomain, api, auth, ssrf, sqli, idor -->
  <g font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">

    <g transform="translate(120,80)">
      <circle r="26" fill="#ec4899"/>
      <text y="5">SUB</text>
    </g>
    <line x1="120" y1="80" x2="222" y2="132" stroke="#ec4899" stroke-width="2" opacity="0.5"/>

    <g transform="translate(380,80)">
      <circle r="26" fill="#22c55e"/>
      <text y="5">API</text>
    </g>
    <line x1="380" y1="80" x2="278" y2="132" stroke="#22c55e" stroke-width="2" opacity="0.5"/>

    <g transform="translate(70,210)">
      <circle r="26" fill="#a855f7"/>
      <text y="5">AUTH</text>
    </g>
    <line x1="70" y1="210" x2="212" y2="162" stroke="#a855f7" stroke-width="2" opacity="0.5"/>

    <g transform="translate(430,210)">
      <circle r="26" fill="#2dd4bf"/>
      <text y="5">SSRF</text>
    </g>
    <line x1="430" y1="210" x2="288" y2="162" stroke="#2dd4bf" stroke-width="2" opacity="0.5"/>

    <g transform="translate(160,300)">
      <circle r="26" fill="#ef4444"/>
      <text y="5">SQLi</text>
    </g>
    <line x1="160" y1="300" x2="235" y2="178" stroke="#ef4444" stroke-width="2" opacity="0.5"/>

    <g transform="translate(340,300)">
      <circle r="26" fill="#fb923c"/>
      <text y="5">IDOR</text>
    </g>
    <line x1="340" y1="300" x2="265" y2="178" stroke="#fb923c" stroke-width="2" opacity="0.5"/>

  </g>
</svg>
