<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e14"/><stop offset="100%" stop-color="#111826"/>
    </linearGradient>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/><stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <g transform="translate(20,30)">
    <path d="M0 60 L0 220 Q0 240 20 240 L340 240 Q360 240 360 220 L360 90 Q360 70 340 70 L180 70 L155 30 Q145 15 125 15 L20 15 Q0 15 0 40 Z" fill="url(#g1)" filter="url(#glow)" opacity="0.95"/>
    <path d="M0 60 L0 220 Q0 240 20 240 L340 240 Q360 240 360 220 L360 90 Q360 70 340 70 L20 70 Q0 70 0 90 Z" fill="#7dd3fc" opacity="0.85"/>
    <!-- three connected nodes representing endpoints -->
    <g transform="translate(130,110)">
      <circle cx="10" cy="15" r="10" fill="#ffffff"/>
      <circle cx="10" cy="70" r="10" fill="#ffffff"/>
      <circle cx="90" cy="42" r="14" fill="#ffffff"/>
      <line x1="10" y1="15" x2="90" y2="42" stroke="#ffffff" stroke-width="4"/>
      <line x1="10" y1="70" x2="90" y2="42" stroke="#ffffff" stroke-width="4"/>
      <path d="M90 30 L98 42 L90 54" fill="none" stroke="#0a0e14" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="180" y="290" font-family="Arial, sans-serif" font-size="34" font-weight="bold" fill="#bae6fd" text-anchor="middle" letter-spacing="4">API</text>
  </g>
</svg>
